name: Daily Research Digest

on:
  workflow_dispatch:
  schedule:
    # 10:45 Asia/Hong_Kong is 02:45 UTC. Temporary schedule trigger test.
    - cron: "45 2 * * *"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Restore sent-paper state
        uses: actions/cache@v4
        with:
          path: .digest-state
          key: research-digest-state-${{ github.run_id }}
          restore-keys: |
            research-digest-state-
      - name: Install package
        run: python -m pip install -e .
      - name: Send digest
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SSL: ${{ secrets.SMTP_SSL }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: python -m research_digest.cli
