name: Daily Research Digest

on:
  workflow_dispatch:
  schedule:
    # 09:00 Asia/Hong_Kong is 01:00 UTC.
    - cron: "0 1 * * *"

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Restore sent-paper state
        uses: actions/cache@v4
        with:
          path: .digest-state
          key: research-digest-state-${{ github.run_id }}
          restore-keys: |
            research-digest-state-
      - name: Install package
        run: python -m pip install -e .
      - name: Send digest
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "465"
          SMTP_USER: fangyanbo970926@gmail.com
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SSL: "true"
          MAIL_FROM: fangyanbo970926@gmail.com
          MAIL_TO: yanbfang-c@my.cityu.edu.hk
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: python -m research_digest.cli
